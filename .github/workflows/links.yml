name: Check links

# Reports dead links in a weekly run + on changes. Report-only (won't fail the
# build) so transient 403s / rate-limits don't leave a red X on the repo.
on:
  push:
    branches: [main]
  pull_request:
  schedule:
    - cron: "0 6 * * 1" # every Monday morning (UTC)
  workflow_dispatch:

jobs:
  link-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check links with Lychee
        uses: lycheeverse/lychee-action@v2
        with:
          args: >-
            --verbose
            --no-progress
            --max-concurrency 8
            --accept 200,206,403,429
            --exclude-mail
            "./README.md"
          fail: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
